version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blackfox-invoicing
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
      # Add your domain here
      - NEXTAUTH_URL=${NEXTAUTH_URL:-http://localhost:3000}
      # Generate a secret: openssl rand -base64 32
      - AUTH_SECRET=${AUTH_SECRET}
      - CRON_SECRET=${CRON_SECRET}

  # This service runs once to initialize the database
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: blackfox-invoicing-init
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/prod.db
    command: sh -c "npx prisma db push && chown -R 1001:1001 /app/data"
    user: root
    profiles: ["init"] # Only runs when explicitly requested
